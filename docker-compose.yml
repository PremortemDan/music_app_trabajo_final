version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: music_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tmdh152001}
      POSTGRES_DB: ${POSTGRES_DB:-music_app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-music_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music_app_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-tmdh152001}@db:5432/${POSTGRES_DB:-music_app}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production_2024}
      PORT: 3000
      UPLOAD_DIR: uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads_data: